<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A90E2" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#4A90E2" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Shield Core -->
  <path d="M100 40 L140 60 V110 C140 140 100 160 100 160 C100 160 60 140 60 110 V60 L100 40Z" fill="none" stroke="#4A90E2" stroke-width="2">
    <animate attributeName="stroke-dasharray" from="0,500" to="500,0" dur="3s" repeatCount="indefinite" />
  </path>
  
  <path d="M100 55 L125 70 V105 C125 125 100 140 100 140 C100 140 75 125 75 105 V70 L100 55Z" fill="url(#shieldGlow)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite" />
  </path>

  <!-- Pulse Waves -->
  <circle cx="100" cy="100" r="10" fill="none" stroke="#4A90E2" stroke-width="1">
    <animate attributeName="r" from="10" to="80" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="100" cy="100" r="10" fill="none" stroke="#4A90E2" stroke-width="1">
    <animate attributeName="r" from="10" to="80" dur="2s" begin="1s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" begin="1s" repeatCount="indefinite" />
  </circle>

  <!-- Floating Particles -->
  <circle cx="60" cy="60" r="2" fill="#4A90E2">
    <animate attributeName="cy" values="60;50;60" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="140" cy="140" r="2" fill="#4A90E2">
    <animate attributeName="cy" values="140;150;140" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>

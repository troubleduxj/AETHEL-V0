<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cubeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Halo Pulses -->
  <g fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.4" filter="url(#glow)">
    <circle cx="200" cy="200" r="50">
      <animate attributeName="r" values="50;160" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="50">
      <animate attributeName="r" values="50;160" dur="2.5s" begin="1.25s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0" dur="2.5s" begin="1.25s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Probability Particles -->
  <g fill="#00f3ff" filter="url(#glow)">
    <circle r="1.5">
      <animate attributeName="cx" values="200;300;100;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;100;300;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle r="2">
      <animate attributeName="cx" values="200;100;300;200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;300;100;200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle r="1">
      <animate attributeName="cx" values="200;250;150;200" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;150;250;200" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Isometric Cube -->
  <g transform="translate(200, 200)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="200 200; 200 185; 200 200" dur="3s" repeatCount="Indefinite" />
    
    <!-- Outer Layer -->
    <g opacity="0.5">
      <path d="M 0 -60 L 52 -30 L 0 0 L -52 -30 Z" fill="url(#cubeGrad)" stroke="#00f3ff" stroke-width="1" />
      <path d="M -52 -30 L 0 0 L 0 60 L -52 30 Z" fill="url(#cubeGrad)" stroke="#00f3ff" stroke-width="1" />
      <path d="M 52 -30 L 0 0 L 0 60 L 52 30 Z" fill="url(#cubeGrad)" stroke="#00f3ff" stroke-width="1" />
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="Indefinite" />
    </g>

    <!-- Inner Core -->
    <g transform="scale(0.4)">
      <path d="M 0 -60 L 52 -30 L 0 0 L -52 -30 Z" fill="#00f3ff" stroke="#ffffff" stroke-width="2" />
      <path d="M -52 -30 L 0 0 L 0 60 L -52 30 Z" fill="#00f3ff" stroke="#ffffff" stroke-width="2" />
      <path d="M 52 -30 L 0 0 L 0 60 L 52 30 Z" fill="#00f3ff" stroke="#ffffff" stroke-width="2" />
      <animateTransform attributeName="transform" type="scale" values="0.4;0.6;0.4" dur="2s" repeatCount="Indefinite" additive="sum" />
    </g>
  </g>
</svg>


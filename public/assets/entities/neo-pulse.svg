<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#ff8800" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Halo Pulses -->
  <g fill="none" stroke="#ff4444" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <circle cx="200" cy="200" r="40">
      <animate attributeName="r" values="40;150" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite" />
      <animate attributeName="stroke-width" values="2;0.5" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="40">
      <animate attributeName="r" values="40;150" dur="2s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="2s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="stroke-width" values="2;0.5" dur="2s" begin="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Particles -->
  <g fill="#ff8800" filter="url(#glow)">
    <circle r="2">
      <animate attributeName="cx" values="200;250;150;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;150;250;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle r="1.5">
      <animate attributeName="cx" values="200;150;250;200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;250;150;200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle r="2.5">
      <animate attributeName="cx" values="200;220;180;200" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;180;220;200" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle r="1.8">
      <animate attributeName="cx" values="200;280;120;200" dur="6s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;120;280;200" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Core -->
  <circle cx="200" cy="200" r="50" fill="url(#pulseGrad)" filter="url(#glow)">
    <animate attributeName="r" values="45;55;45" dur="1s" repeatCount="indefinite" />
  </circle>
  
  <!-- Lightning Arcs -->
  <g stroke="#ff4444" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.8">
    <path d="M 200 200 L 250 100 L 220 130 L 280 50">
      <animate attributeName="stroke-dasharray" values="0,500;500,0" dur="0.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite" />
    </path>
    <path d="M 200 200 L 150 100 L 180 130 L 120 50">
      <animate attributeName="stroke-dasharray" values="0,500;500,0" dur="0.7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite" />
    </path>
    <path d="M 200 200 L 250 300 L 220 270 L 280 350">
      <animate attributeName="stroke-dasharray" values="0,500;500,0" dur="0.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="0.6s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Spikes -->
  <g stroke="#ff4444" stroke-width="2.5" filter="url(#glow)">
    <path d="M 200 120 L 200 70" />
    <path d="M 200 280 L 200 330" />
    <path d="M 120 200 L 70 200" />
    <path d="M 280 200 L 330 200" />
  </g>
  
  <!-- Orbital Rings -->
  <ellipse cx="200" cy="200" rx="100" ry="30" fill="none" stroke="#ff8800" stroke-width="1.5" stroke-dasharray="15 10" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="5s" repeatCount="indefinite" />
  </ellipse>
</svg>


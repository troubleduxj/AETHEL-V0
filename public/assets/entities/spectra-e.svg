<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spectraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0.8">
        <animate attributeName="offset" values="0;1;0" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#00ff00" stop-opacity="0.8">
        <animate attributeName="offset" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0000ff" stop-opacity="0.8">
        <animate attributeName="offset" values="0.5;1.5;0.5" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Halo Pulses -->
  <g fill="none" stroke="url(#spectraGrad)" stroke-width="2" opacity="0.4" filter="url(#glow)">
    <circle cx="200" cy="200" r="50">
      <animate attributeName="r" values="50;170" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="50">
      <animate attributeName="r" values="50;170" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0" dur="4s" begin="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Scanning Particles -->
  <g fill="#ffffff" filter="url(#glow)">
    <circle r="1.5">
      <animate attributeName="cx" values="200;380;20;200" dur="6s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;20;380;200" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle r="1">
      <animate attributeName="cx" values="200;20;380;200" dur="7s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;380;20;200" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Concentric Spectral Rings -->
  <g transform="translate(200, 200)" filter="url(#glow)">
    <circle r="100" fill="none" stroke="url(#spectraGrad)" stroke-width="2.5" opacity="0.4">
      <animate attributeName="r" values="90;110;90" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle r="80" fill="none" stroke="url(#spectraGrad)" stroke-width="4.5" opacity="0.6">
      <animate attributeName="r" values="70;90;70" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- The Observer Eye -->
    <g>
      <ellipse cx="0" cy="0" rx="40" ry="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7">
        <animate attributeName="ry" values="20;2;20" dur="4s" repeatCount="indefinite" />
      </ellipse>
      <circle r="12" fill="#ffffff" opacity="0.9">
        <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
    
    <!-- Multi-dimensional Scanning Lines -->
    <g opacity="0.5">
      <path d="M -150 -50 L 150 50" stroke="#00ffff" stroke-width="0.8">
        <animateTransform attributeName="transform" type="translate" values="0 -100; 0 100; 0 -100" dur="6s" repeatCount="indefinite" />
      </path>
      <path d="M -150 50 L 150 -50" stroke="#ff00ff" stroke-width="0.8">
        <animateTransform attributeName="transform" type="translate" values="0 100; 0 -100; 0 100" dur="7s" repeatCount="indefinite" />
      </path>
    </g>
  </g>
</svg>


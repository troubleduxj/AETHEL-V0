<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B59B6" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#9B59B6" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Outer Rings -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#9B59B6" stroke-width="0.5" stroke-dasharray="10 5">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#9B59B6" stroke-width="0.5" stroke-dasharray="5 10">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite" />
  </circle>

  <!-- Central Eye -->
  <ellipse cx="100" cy="100" rx="50" ry="30" fill="none" stroke="#9B59B6" stroke-width="2">
    <animate attributeName="ry" values="30;5;30" dur="4s" repeatCount="indefinite" />
  </ellipse>
  <circle cx="100" cy="100" r="15" fill="url(#eyeGlow)">
    <animate attributeName="r" values="15;18;15" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="100" r="5" fill="#FFFFFF">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite" />
  </circle>

  <!-- Data Stream Particles -->
  <g fill="#9B59B6" font-family="monospace" font-size="8">
    <text x="40" y="100">1010
      <animate attributeName="x" from="40" to="160" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
    </text>
    <text x="160" y="80">0111
      <animate attributeName="x" from="160" to="40" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </text>
    <text x="60" y="140">1100
      <animate attributeName="x" from="60" to="140" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </text>
  </g>
</svg>

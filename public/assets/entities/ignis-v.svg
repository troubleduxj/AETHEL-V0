<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2a2a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff2a2a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景微光 -->
  <circle cx="200" cy="250" r="150" fill="url(#glowRed)" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- 核心几何体 -->
  <g filter="url(#blurRed)" transform="translate(200, 250)">
    <polygon points="0,-80 60,40 -60,40" fill="none" stroke="#ff4d4d" stroke-width="4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,80 60,-40 -60,-40" fill="none" stroke="#ff1a1a" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="7s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="0" cy="0" r="20" fill="#ff0000"/>
  </g>
  <!-- 碎片化数据流 -->
  <g fill="#ff8080">
    <rect x="150" y="100" width="5" height="20"><animate attributeName="y" values="100;300" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/></rect>
    <rect x="250" y="350" width="8" height="15"><animate attributeName="y" values="350;150" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="1.5s" repeatCount="indefinite"/></rect>
  </g>
</svg>

<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="aetherGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Divine Core -->
  <g transform="translate(200, 250)" filter="url(#glow)">
    <circle r="60" fill="url(#aetherGrad)">
      <animate attributeName="r" values="55;65;55" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <!-- Expanding Halo Ripples -->
    <circle r="80" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0">
      <animate attributeName="r" values="60;150" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.4;0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle r="100" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0">
      <animate attributeName="r" values="80;200" dur="6s" begin="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.3;0" dur="6s" begin="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Geometric Accents -->
    <path d="M 0 -80 L 10 -70 L 0 -60 L -10 -70 Z" fill="#ffffff" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </path>
    <path d="M 0 80 L 10 70 L 0 60 L -10 70 Z" fill="#ffffff" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </path>
  </g>
</svg>

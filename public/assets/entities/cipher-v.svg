<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cipherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Labyrinthine Lines -->
  <g transform="translate(200, 250)" filter="url(#glow)">
    <!-- Outer Labyrinth -->
    <path d="M -100 -100 L 100 -100 L 100 100 L -100 100 Z" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.3">
      <animate attributeName="stroke-dasharray" values="0 400; 400 0; 0 400" dur="10s" repeatCount="indefinite" />
    </path>
    <path d="M -80 -80 L 80 -80 L 80 80 L -80 80 Z" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.4">
      <animate attributeName="stroke-dasharray" values="400 0; 0 400; 400 0" dur="8s" repeatCount="indefinite" />
    </path>
    
    <!-- Central Decrypting Core -->
    <rect x="-30" y="-30" width="60" height="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite" />
    </rect>
    <rect x="-20" y="-20" width="40" height="40" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="3s" repeatCount="indefinite" />
    </rect>
    
    <!-- Flowing Data Bits -->
    <circle r="2" fill="#ffffff">
      <animate attributeName="cx" values="-100;100" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="-100;-100" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle r="2" fill="#ffcc00">
      <animate attributeName="cx" values="100;-100" dur="5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="100;100" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="zenithGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Geometric Fractal -->
  <g stroke="#FFFFFF" stroke-width="1" fill="none">
    <rect x="60" y="60" width="80" height="80">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite" />
    </rect>
    <rect x="70" y="70" width="60" height="60">
      <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="8s" repeatCount="indefinite" />
    </rect>
    <rect x="80" y="80" width="40" height="40">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Central Singularity -->
  <circle cx="100" cy="100" r="10" fill="url(#zenithGlow)">
    <animate attributeName="r" values="10;15;10" dur="0.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Collapsing Photons -->
  <line x1="100" y1="100" x2="180" y2="100" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="2s" repeatCount="indefinite" />
  </line>
  <line x1="100" y1="100" x2="20" y2="100" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="2s" repeatCount="indefinite" />
  </line>
  <line x1="100" y1="100" x2="100" y2="180" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="2s" repeatCount="indefinite" />
  </line>
  <line x1="100" y1="100" x2="100" y2="20" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="2s" repeatCount="indefinite" />
  </line>

  <!-- High Frequency Particles -->
  <circle cx="100" cy="100" r="2" fill="#FFFFFF">
    <animate attributeName="cx" values="100;180;100" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="100" r="2" fill="#FFFFFF">
    <animate attributeName="cx" values="100;20;100" dur="1s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>

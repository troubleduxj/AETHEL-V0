<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="200" cy="250" r="120" fill="url(#glowCyan)" opacity="0.5">
    <animate attributeName="r" values="110;130;110" dur="4s" repeatCount="indefinite"/>
  </circle>
  <g filter="url(#blurCyan)" transform="translate(200, 250)">
    <!-- 六边形护盾 -->
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" fill="none" stroke="#00ffff" stroke-width="3" opacity="0.8"/>
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35" fill="none" stroke="#00b3b3" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="15s" repeatCount="indefinite"/>
    </polygon>
    <!-- 核心眼 -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#e6ffff" stroke-width="4"/>
    <circle cx="0" cy="0" r="10" fill="#00ffff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- 扫描线 -->
  <line x1="100" y1="250" x2="300" y2="250" stroke="#00ffff" stroke-width="2" opacity="0.5">
    <animate attributeName="y1" values="150;350;150" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="150;350;150" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>

<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vortexGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f000ff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#f000ff" stop-opacity="0" />
    </radialGradient>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Halo Pulses -->
  <g fill="none" stroke="#f000ff" stroke-width="2" opacity="0.5" filter="url(#glow)">
    <circle cx="200" cy="200" r="40">
      <animate attributeName="r" values="40;180" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="40">
      <animate attributeName="r" values="40;180" dur="3s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0" dur="3s" begin="1.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Void Particles -->
  <g fill="#f000ff" filter="url(#glow)">
    <circle r="1.5">
      <animate attributeName="cx" values="200;350;50;200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;50;350;200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle r="2">
      <animate attributeName="cx" values="200;50;350;200" dur="6s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;350;50;200" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle r="1">
      <animate attributeName="cx" values="200;280;120;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;120;280;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Vortex -->
  <g transform="translate(200, 200)" filter="url(#glitch)">
    <!-- Singularity Core -->
    <circle r="25" fill="#000000" stroke="#f000ff" stroke-width="3" filter="url(#glow)">
      <animate attributeName="r" values="25;32;25" dur="1.2s" repeatCount="Indefinite" />
    </circle>
    
    <circle r="130" fill="url(#vortexGrad)" opacity="0.5" filter="url(#glow)" />
    
    <!-- Spinning Rings -->
    <g filter="url(#glow)">
      <path d="M 0 -110 Q 110 -110 110 0 Q 110 110 0 110 Q -110 110 -110 0 Q -110 -110 0 -110" fill="none" stroke="#f000ff" stroke-width="2.5" stroke-dasharray="40 20">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" repeatCount="Indefinite" />
      </path>
      <path d="M 0 -80 Q 80 -80 80 0 Q 80 80 0 80 Q -80 80 -80 0 Q -80 -80 0 -80" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="20 15" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="3s" repeatCount="Indefinite" />
      </path>
    </g>

    <!-- Void Mist -->
    <g stroke="#f000ff" stroke-width="1" fill="none" opacity="0.4" filter="url(#glow)">
      <path d="M -160 -160 Q -110 -60 0 0">
        <animate attributeName="d" values="M -160 -160 Q -110 -60 0 0; M -130 -130 Q -90 -50 0 0; M -160 -160 Q -110 -60 0 0" dur="4s" repeatCount="Indefinite" />
      </path>
      <path d="M 160 160 Q 110 60 0 0">
        <animate attributeName="d" values="M 160 160 Q 110 60 0 0; M 130 130 Q 90 50 0 0; M 160 160 Q 110 60 0 0" dur="4s" repeatCount="Indefinite" />
      </path>
    </g>
  </g>
</svg>


<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="obsidianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="1" />
      <stop offset="100%" stop-color="#333333" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="energyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0" />
      <stop offset="50%" stop-color="#ff4400" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Halo Pulses -->
  <g fill="none" stroke="#ff4400" stroke-width="2" opacity="0.3" filter="url(#glow)">
    <circle cx="200" cy="200" r="50">
      <animate attributeName="r" values="50;180" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="50">
      <animate attributeName="r" values="50;180" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0" dur="4s" begin="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Gravity Particles -->
  <g fill="#ffffff" filter="url(#glow)">
    <circle r="1.5">
      <animate attributeName="cx" values="20;200" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="20;200" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle r="1">
      <animate attributeName="cx" values="380;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="380;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Heavy Interlocking Plates -->
  <g transform="translate(200, 200)" filter="url(#glow)">
    <!-- Central Pillar -->
    <rect x="-25" y="-150" width="50" height="300" fill="url(#obsidianGrad)" stroke="#000" stroke-width="2" />
    
    <!-- Side Plates -->
    <rect x="-75" y="-120" width="40" height="240" fill="url(#obsidianGrad)" stroke="#000" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" values="0 0; -5 0; 0 0" dur="5s" repeatCount="indefinite" />
    </rect>
    <rect x="35" y="-120" width="40" height="240" fill="url(#obsidianGrad)" stroke="#000" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" values="0 0; 5 0; 0 0" dur="5s" repeatCount="indefinite" />
    </rect>
    
    <!-- Outer Wings -->
    <path d="M -120 -80 L -85 -100 L -85 100 L -120 80 Z" fill="url(#obsidianGrad)" stroke="#000" stroke-width="2" />
    <path d="M 120 -80 L 85 -100 L 85 100 L 120 80 Z" fill="url(#obsidianGrad)" stroke="#000" stroke-width="2" />
    
    <!-- Energy Flows in Gaps -->
    <rect x="-30" y="-140" width="5" height="280" fill="url(#energyGrad)">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
    </rect>
    <rect x="25" y="-140" width="5" height="280" fill="url(#energyGrad)">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>

